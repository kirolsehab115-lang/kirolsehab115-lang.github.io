<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
</head>
<body>
    
<div class="content">
    <h2>Add New Course</h2>
    <p>Enter the details of your new learning journey:</p>

    <form style="margin-top: 20px; display: flex; flex-direction: column; gap: 15px; max-width: 300px;">
        
        <div>
            <label style="display: block;">Course Name:</label>
            <input type="text" placeholder=enter yor course="width: 100%; padding: 8px;">
        </div>

        <div>
            <label style="display: block;">Instructor:</label>
            <input type="text" placeholder="Instructor Name" style="width: 100%; padding: 8px;">
        </div>

        <div>
            <label style="display: block;">Course Link:</label>
            <input type="url" placeholder="https://youtube.com/..." style="width: 100%; padding: 8px;">
        </div>

        <button type="submit" style="background-color: #ff4444; color: white; border: none; padding: 10px; cursor: pointer;">
            Add Course
        </button>

    </form>
</div>

</body>
</html>
